version: "3.8"

services:

  jmeter-master:
    image: justb4/jmeter
    container_name: jmeter-master
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
    volumes:
      - ./tests:/tests
    depends_on:
      - jmeter-slave-1
      - jmeter-slave-2
      - jmeter-slave-3
    entrypoint: ["sh", "-c"]
    command: "while true; do sleep 30; done"

  jmeter-slave-1:
    image: justb4/jmeter
    container_name: jmeter-slave-1
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024 
    command: jmeter-server

  jmeter-slave-2:
    image: justb4/jmeter
    container_name: jmeter-slave-2
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
    command: jmeter-server

  jmeter-slave-3:
    image: justb4/jmeter
    container_name: jmeter-slave-3
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
    command: jmeter-server

