version: "3.8"

services:

  jmeter-master:
    image: justb4/jmeter
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
      - JMETER_REMOTE_HOSTS=jmeter-slave-1,jmeter-slave-2,jmeter-slave-3
    volumes:
      - ../tests:/tests
    depends_on:
      - jmeter-slave-1
      - jmeter-slave-2
      - jmeter-slave-3
    entrypoint: ["sh", "-c"]
    command: ["while true; do sleep 30; done"]
   
  jmeter-slave-1:
    image: justb4/jmeter
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024 
      - RMI_HOSTNAME=jmeter-slave-1
    command: >
      jmeter-server
      -Dserver.rmi.ssl.disable=true
      -Dserver_port=1099
      -Dserver.rmi.localport=50000
    ports:
      - "1099:1099"
      - "50000:50000"
   
  jmeter-slave-2:
    image: justb4/jmeter
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
      - RMI_HOSTNAME=jmeter-slave-2
    command: >
      jmeter-server
      -Dserver.rmi.ssl.disable=true
      -Dserver_port=1099
      -Dserver.rmi.localport=50000
    ports:
      - "1099:1099"
      - "50001:50001"
    
  jmeter-slave-3:
    image: justb4/jmeter
    environment:
      - JVM_XMS=512
      - JVM_XMX=1024
      - RMI_HOSTNAME=jmeter-slave-3
    command: >
      jmeter-server
      -Dserver.rmi.ssl.disable=true
      -Dserver_port=1099
      -Dserver.rmi.localport=50000
    ports:
      - "1099:1099"
      - "50000:50000"
